name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format cmake ninja-build g++ libgtest-dev

      - name: Check formatting
        run: make fmt-check

      - name: Build and run tests
        run: make ci-test
